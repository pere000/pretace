<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ontology Test</title>

<style>

</style>

<script>
const urlList="https://pretace.surge.sh/book/taceDoc/conceptsList.txt";
//https://raw.githubusercontent.com/pere000/pretace/refs/heads/main/docs/book/taceDoc/conceptsList.txt
function showDefinition(url,n,id){
 let x=new XMLHttpRequest();
 x.onload=()=>document.getElementById(id).innerHTML=
   x.responseText.split(/\r?\n/)[n-1].replace(/^[^|]*\|/,"");
 x.open("GET",url);
 x.send();
}
</script>

</head>
<body>

This is the
<span style='color:maroon;cursor:pointer;' onclick="showDefinition(urlList,29,'divId1')">definition</span>
of Matrix (https://github.com/pere000/pretace/blob/main/docs/conceptsList.html; https://pretace.surge.sh/conceptsList.html).

<div id="divId1" style='font-size:12px;color:gray;margin-top:10px;'></div>

</body>
</html>
