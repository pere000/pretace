<div id="hello_world" style='margin-top:20px'></div>

<script>

let currentConcept = null;
let currentEdit = null;
let selectedModel = 'GPT-4o'; // Store selected model
const apiBase = window.location.protocol === "file:"
    ? "http://127.0.0.1:8000"
    : "";

function apiPath(path){
    return apiBase ? apiBase + path : path;
}

function apiFetch(path, options){
    return fetch(apiPath(path), options);
}

async function openResourceDocument(path, title){
    const response = await apiFetch("/resources/document/" + encodeURIComponent(path));
    const payload = await response.json();

    if (!response.ok){
        document.getElementById("hello_world").innerHTML =
            "<div style='color:red'>" + escapeHtml(payload.detail || response.statusText) + "</div>";
        return;
    }

    let html = "";
    html += "<div style='color:navy;font-weight:bold'>" + escapeHtml(payload.title || title) + "</div><br>";
    html += "<pre class='ontology-text' style='margin:0;white-space:pre-wrap'>" + escapeHtml(payload.content || "") + "</pre>";
    document.getElementById("hello_world").innerHTML = html;
}

function renderResourceButtons(title, items){
    let html = "";

    html += "<div style='color:navy;font-weight:bold'>";
    html += escapeHtml(title);
    html += "</div><br>";

    for(const item of items){
        html +=
            "<input " +
            "type='button' " +
            "value='" + escapeHtml(item.label) + "' " +
            "style='margin-right:4px;margin-bottom:4px;' " +
            "onclick=\"openResourceDocument('" + item.path.replaceAll("'", "\\'") + "','" + item.label.replaceAll("'", "\\'") + "')\"> ";
    }

    document.getElementById("hello_world").innerHTML = html;
}

async function loadResourceFolder(folder, title){
    const response = await apiFetch("/resources/folder/" + encodeURIComponent(folder));
    const payload = await response.json();

    if (!response.ok){
        document.getElementById("hello_world").innerHTML =
            "<div style='color:red'>" + escapeHtml(payload.detail || response.statusText) + "</div>";
        return;
    }

    renderResourceButtons(title, payload.items || []);
}

async function constitutions(){ return loadResourceFolder("constitution", "Constitutions"); }

async function architecture(){ return loadResourceFolder("architecture", "Architecture"); }

async function governance(){ return loadResourceFolder("governance", "Governance"); }

    ontologies();

}

function hideAll(){

    document.querySelectorAll(".panel").forEach(
        p => p.style.display = "none"
    );

    document.getElementById("hello_world").innerHTML = "";

}

    document.getElementById("resources_panel").style.display="block";

}

}

function escapeHtml(value){
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
}

function renderList(items){
    if (!items || !items.length){
        return "<div style='margin-left:15px'>(none)</div>";
    }

    let html = "<ul style='margin-top:4px'>";
    for (const item of items){
        const content = typeof item === "string"
            ? item
            : JSON.stringify(item, null, 2);
        html += "<li><pre style='margin:0;white-space:pre-wrap'>" +
                escapeHtml(content) +
                "</pre></li>";
    }
    html += "</ul>";
    return html;
}

function renderAskResult(data){
    let html = "";

    html += "<div style='color:navy;font-weight:bold'>Status</div>";
    html += "<div style='margin-left:15px'>" + escapeHtml(data.status || "") + "</div>";

    html += "<div style='color:navy;font-weight:bold;margin-top:10px'>Trace ID</div>";
    html += "<div style='margin-left:15px'>" + escapeHtml(data.trace_id || "") + "</div>";

    html += "<div style='color:navy;font-weight:bold;margin-top:10px'>Canonical Answer</div>";
    html += "<div class='ontology-text' style='margin-left:15px'>" +
            escapeHtml(data.answer || "") +
            "</div>";

    html += "<div style='color:navy;font-weight:bold;margin-top:10px'>Optional Assisted Explanation</div>";
    html += "<div class='ontology-text' style='margin-left:15px'>" +
            escapeHtml(data.assisted_explanation || "(none)") +
            "</div>";

    html += "<div style='color:navy;font-weight:bold;margin-top:10px'>Justification</div>";
    html += renderList(data.justification || []);

    html += "<div style='color:navy;font-weight:bold;margin-top:10px'>Provenance</div>";
    html += renderList(data.provenance || []);

    return html;
}

async function runAskTACE(){

    const question = document.getElementById("ask_tace_question").value.trim();
    const assist = document.getElementById("ask_tace_assist").checked;
    const rendering_mode = document.getElementById("ask_tace_rendering_mode").value;
    const resultBox = document.getElementById("ask_tace_result");

    if (!question){
        alert("Question is required.");
        return;
    }

    resultBox.innerHTML = "Processing...";

    const response = await apiFetch("/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            question,
            assist,
            rendering_mode
        })
    });

    let payload = {};
    try {
        payload = await response.json();
    } catch (_) {
    }

    if (!response.ok){
        const detail = payload.detail || response.statusText;
        resultBox.innerHTML = "<span style='color:red'>Error: " +
                              escapeHtml(detail) +
                              "</span>";
        return;
    }

    resultBox.innerHTML = renderAskResult(payload);
}


function repository(){

    document.getElementById("repository_panel").style.display="block";

function browser(){

    ontologies();

async function openModule(module){

    const r = await apiFetch("/ontology/module/" + encodeURIComponent(module));

    const concepts = await r.json();

    let html = "";

    html += "<div style='color:navy;font-weight:bold'>";
    html += module;
    html += "</div><br>";

    for(const c of concepts){

        html +=
            "<input " +
            "type='button' " +
            "value='" + c + "' " +
            "style='margin-right:4px;margin-bottom:4px;' " +
            "onclick=\"openConcept('" + module + "','" + c + "')\"> ";

    }

    document.getElementById("hello_world").innerHTML = html;

}




async function openConcept(module, concept){

    const r = await apiFetch(
        "/ontology/concept/" +
        encodeURIComponent(module) +
        "/" +
        encodeURIComponent(concept)
    );

    const c = await r.json();

    currentConcept = {
        module,
        concept,
        data: c,
    };

    renderConcept();
}

function renderConcept(){

    const module = currentConcept.module;
    const concept = currentConcept.concept;
    const c = currentConcept.data;

    let html = "";

    html += "<div style='color:navy;font-weight:bold'>";
    html += c.concept_name;
    html += "</div><br>";

    const fields = [
        ["Definition","definition"],
        ["Assumptions","assumptions"],
        ["Scope","scope"],
        ["Historical Development","historical_development"],
        ["TACE Transformation","tace_transformation"],
        ["References","references_text"],
        ["Status","status"]
    ];

    const editableFields = new Set([
        "definition",
        "assumptions",
        "scope",
        "historical_development",
        "tace_transformation",
        "references_text"
    ]);

    for(const f of fields){

        html += "<div style='color:navy;font-weight:bold;margin-top:10px'>";
        html += f[0];
        html += "</div>";

        const isLongTextField = editableFields.has(f[1]);

        html += isLongTextField
            ? "<div class='ontology-text' style='margin-left:15px'>"
            : "<div style='margin-left:15px'>";

        if (currentEdit && currentEdit.field === f[1]){
            html += "<textarea id='edit_field_value' style='width:100%;min-height:120px'>" +
                    (c[f[1]] || "") +
                    "</textarea> ";
            html += "<input type='button' value='Save' onclick='saveEdit()'> ";
            html += "<input type='button' value='Cancel' onclick='cancelEdit()'>";
        } else {
            html += (c[f[1]] || "");

            if (editableFields.has(f[1])){
                html += " <input type='button' value='Edit' onclick=\"editField('" +
                        module + "','" +
                        concept + "','" +
                        f[1] + "')\"> ";
            }
        }

        html += "</div>";

    }

    document.getElementById("hello_world").innerHTML = html;
}

function editField(module,concept,field){

    if (currentEdit && currentEdit.field !== field){
        alert('Finish editing the current field before editing another field.');
        return;
    }

    currentEdit = {
        module,
        concept,
        field,
    };

    renderConcept();
}

function cancelEdit(){
    currentEdit = null;
    renderConcept();
}

async function saveEdit(){
    if (!currentEdit){
        return;
    }

    const value = document.getElementById('edit_field_value').value;

    const payload = {
        module: currentEdit.module,
        concept: currentEdit.concept,
        field: currentEdit.field,
        value,
    };

    const r = await apiFetch('/ontology/update', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    });

    if (!r.ok){
        const error = await r.json();
        alert('Update failed: ' + (error.detail || r.statusText));
        return;
    }

    const c = await r.json();

    currentConcept.data = c;
    currentEdit = null;
    renderConcept();
}

async function exportModule(){

    const modulesResponse = await apiFetch('/ontology/modules');

    if (!modulesResponse.ok){
        alert('Could not load modules.');
        return;
    }

    const modules = await modulesResponse.json();

    if (!modules.length){
        alert('No ontology modules available.');
        return;
    }

    const selected = prompt(
        'Select ontology module to export:\n\n' + modules.join('\n'),
        modules[0]
    );

    if (!selected){
        return;
    }

    const module = selected.trim();

    if (!module){
        return;
    }

    const response = await apiFetch('/ontology/export', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ module })
    });

    if (!response.ok){
        let detail = response.statusText;
        try {
            const err = await response.json();
            detail = err.detail || detail;
        } catch (_) {
        }
        alert('Export failed: ' + detail);
        return;
    }

    const blob = await response.blob();
    const disposition = response.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename="?([^";]+)"?/i);
    const filename = match ? match[1] : (module + '.tace');

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    alert('Export generated: ' + filename);
}

// Function to handle single selection of AI Model
function selectModel(modelName, buttonEl) {
    selectedModel = modelName;
    document.querySelectorAll('.model-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    buttonEl.classList.add('active');
}

// Function to add a new AI Model dynamically
function addModel() {
    const input = document.getElementById("new_model_name");
    const modelName = input.value.trim();
    if (!modelName) {
        alert("Please enter a model name.");
        return;
    }

    // Check if model already exists (case-insensitive)
    let exists = false;
    document.querySelectorAll(".model-btn").forEach(btn => {
        if (btn.value.toLowerCase() === modelName.toLowerCase()) {
            exists = true;
        }
    });

    if (exists) {
        alert("This model already exists.");
        return;
    }

    const container = document.getElementById("model_buttons_container");
    const newBtn = document.createElement("input");
    newBtn.type = "button";
    newBtn.className = "model-btn";
    newBtn.value = modelName;
    newBtn.id = modelName; // Set the button ID to the exact model name value
    newBtn.style.marginRight = "8px";
    newBtn.style.marginBottom = "8px";
    newBtn.onclick = function() {
        selectModel(modelName, this);
    };

    container.appendChild(newBtn);
    selectModel(modelName, newBtn); // Auto-select the newly added model
    input.value = ""; // Clear text field
}

// Function to delete the currently selected AI Model
function deleteModel() {
    const container = document.getElementById("model_buttons_container");
    const activeBtn = container.querySelector(".model-btn.active");
    if (!activeBtn) {
        alert("No model is currently selected to delete.");
        return;
    }

    activeBtn.remove();

    // Select another model if any remain
    const remainingBtns = container.querySelectorAll(".model-btn");
    if (remainingBtns.length > 0) {
        remainingBtns[0].click();
    } else {
        selectedModel = "";
    }
}
</script>
